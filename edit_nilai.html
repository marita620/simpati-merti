<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Form Edit Nilai</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    background:#f5f5f5;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    min-height:100vh;
    background:linear-gradient(180deg,#8B0000,#C1121F);
    padding:25px;
    color:white;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #FFD166;
}

.logo h2{
    margin-top:15px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    text-decoration:none;
    color:white;
    border-radius:10px;
    transition:.3s;
}

.sidebar a:hover,
.active{
    background:rgba(255,255,255,.2);
}

/* MAIN */

.main{
    flex:1;
    padding:30px;
}

.header{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.header h1{
    color:#8B0000;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    max-width:700px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:500;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#8B0000;
}

.button-group{
    display:flex;
    gap:15px;
    margin-top:30px;
}

.btn-update{
    flex:1;
    background:#F59E0B;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

.btn-kembali{
    flex:1;
    background:#888;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

.btn-update:hover{
    background:#d97706;
}

.btn-kembali:hover{
    background:#666;
}

</style>
</head>
<body>
<div class="sidebar">
<div class="logo">
<img src="logomerti.jpeg">
<h2>SIMPATI MERTI</h2>
</div>

<a href="pengajar.html">🏠 Beranda</a>
<a href="kelola_nilai.html" class="active">📝 Kelola Nilai Siswa</a>
<a href="kelola_siswa.html">👨 Kelola Data Siswa</a>
<a href="kelola_mapel.html">📚 Kelola Data Mapel</a>
<a href="login.html">🚪 Logout</a>
</div>

<div class="main">
<div class="header">
<h1>Form Edit Nilai</h1>
<p>Ubah data nilai siswa kemudian klik Update.</p>
</div>
<div class="card">
<form id="formEdit">
<label>ID Nilai</label>
<input type="text" value="N001" readonly>
<label>Nama Siswa</label>
<input type="text" value="Budi">
<label>Mata Pelajaran</label>
<input type="text" value="Matematika">

<label>Nilai</label>
<input type="number" value="85" min="0" max="100">

<div class="button-group">

<button type="submit" class="btn-update">
Update
</button>

<button
type="button"
class="btn-kembali"
onclick="location.href='edit_nilai.html'">

Kembali

</button>

</div>

</form>

</div>

</div>

<script>

document.getElementById("formEdit").addEventListener("submit",function(e){

e.preventDefault();

alert("Data nilai berhasil diperbarui!");

window.location="edit_nilai.html";

});

</script>

</body>
</html>
