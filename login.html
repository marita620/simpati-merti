<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SIMPATI MERTI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #ffffff;
        font-family: "Poppins", sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        padding: 25px;
      }

      /* =======================
   CONTAINER
======================= */

      .container {
        width: 95%;
        max-width: 1600px;
        height: 92vh;

        display: flex;
        gap: 0px;
      }

      /* =======================
   PANEL KIRI
======================= */

      .left {
        flex: 1;

        background: linear-gradient(135deg, #8b0000, #c1121f);

        border-radius: 70px;

        position: relative;

        overflow: hidden;

        display: flex;
        justify-content: center;
        align-items: center;

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      }

      .left::before {
        content: "";

        position: absolute;

        width: 550px;
        height: 550px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.06);

        top: -250px;
        left: -180px;
      }

      .left::after {
        content: "";

        position: absolute;

        width: 450px;
        height: 450px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.05);

        bottom: -180px;
        right: -180px;
      }

      .welcome-box {
        text-align: center;

        color: white;

        z-index: 5;
      }

      .sugeng {
        font-family: "Cormorant Garamond", serif;

        font-size: 100px;

        line-height: 1;

        margin-bottom: 15px;
      }

      .simpati {
        font-size: 38px;

        letter-spacing: 10px;

        color: #ffd166;

        margin-bottom: 30px;
      }

      .desc {
        font-size: 20px;

        line-height: 1.8;

        margin-bottom: 40px;
      }

      .logo {
        width: 250px;
        height: 250px;

        background: white;

        border-radius: 50%;

        margin: auto;

        display: flex;
        justify-content: center;
        align-items: center;

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      .logo-text {
        color: #8b0000;

        font-size: 48px;

        font-weight: 700;
      }

      /* =======================
   PANEL KANAN
======================= */

      .right {
        flex: 1;

        background: white;

        border-radius: 70px;

        display: flex;
        justify-content: center;
        align-items: center;

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);

        border: 1px solid #efefef;
      }

      .login-card {
        width: 550px;

        padding: 20px;
      }

      .login-card h2 {
        text-align: center;

        font-size: 72px;

        color: #8b0000;

        margin-bottom: 10px;
      }

      .login-card p {
        text-align: center;

        color: #777;

        margin-bottom: 40px;

        font-size: 18px;
      }

      label {
        display: block;

        margin-top: 18px;
        margin-bottom: 10px;

        font-weight: 600;

        font-size: 18px;
      }

      input,
      select {
        width: 100%;

        padding: 18px;

        border: 2px solid #eeeeee;

        border-radius: 22px;

        font-size: 16px;

        transition: 0.3s;
      }

      input:focus,
      select:focus {
        outline: none;

        border-color: #dc2626;

        box-shadow: 0 0 15px rgba(220, 38, 38, 0.15);
      }

      button {
        width: 100%;

        margin-top: 35px;

        padding: 18px;

        border: none;

        border-radius: 22px;

        background: linear-gradient(90deg, #8b0000, #dc2626);

        color: white;

        font-size: 20px;

        font-weight: 600;

        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);

        box-shadow: 0 10px 25px rgba(220, 38, 38, 0.35);
      }

      /* =======================
   RESPONSIVE
======================= */

      @media (max-width: 1100px) {
        .container {
          flex-direction: column;

          height: auto;
        }

        .left,
        .right {
          border-radius: 40px;
        }

        .sugeng {
          font-size: 70px;
        }

        .simpati {
          font-size: 26px;
        }

        .login-card {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="welcome-box">
          <h1 class="sugeng">Sugeng Rawuh</h1>

          <h2 class="simpati">~~SIMPATI MERTI~~</h2>

          <p class="desc">
            Sebuah Sistem Informasi<br />
            Pengelolaan Penilaian
          </p>

          <div class="logo">
            <div class="SIMPATI MERTI">
              <img src="logomerti.jpeg" alt="Logo SIMPATI MERTI" style="width: 100%; height: 100%; border-radius: 50%" />
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="login-card">
          <h2>LOGIN</h2>

          <p>Masukkan identitas Anda untuk melanjutkan</p>

          <form>
            <label>Pengguna</label>

            <select>
              <option>Pilih Pengguna</option>
              <option>Admin</option>
              <option>Siswa</option>
              <option>Pengajar</option>
            </select>

            <label>ID</label>

            <input type="text" placeholder="Masukkan ID Anda" />

            <label>Password</label>

            <input type="password" placeholder="Masukkan Password Anda" />

            <button type="submit">Login</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
