<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Nilai Bahasa Indonesia</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f5f5f5;
      }

      /* HEADER */

      .header {
        background: linear-gradient(135deg, #8b0000, #c1121f);
        color: white;
        padding: 25px 40px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .kembali {
        text-decoration: none;
        color: white;
        background: rgba(255, 255, 255, 0.2);
        padding: 10px 20px;
        border-radius: 10px;
      }

      /* CONTAINER */

      .container {
        width: 90%;
        margin: 30px auto;
      }

      /* CARD */

      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .judul {
        color: #8b0000;
        margin-bottom: 20px;
      }

      /* BUTTON */

      .button-group {
        margin-bottom: 20px;
      }

      .button-group button {
        border: none;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 15px;
      }

      .btn-tambah {
        background: #8b0000;
      }

      .btn-edit {
        background: #f59e0b;
      }

      .btn-hapus {
        background: #dc2626;
      }

      /* TABLE */

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #8b0000;
        color: white;
        padding: 15px;
      }

      td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      .kosong {
        color: #777;
        padding: 25px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Nilai Bahasa Indonesia</h1>

      <a href="kelola_nilai.html" class="kembali"> Kembali </a>
    </div>

    <div class="container">
      <div class="card">
        <h2 class="judul">Data Nilai Bahasa Indonesia</h2>

        <div class="button-group">
          <button class="btn-tambah" onclick="window.location.href = 'tambah_nilai_bindo.html'">+ Tambah Nilai</button>

          <button class="btn-edit" onclick="window.location.href = 'cari_edit_nilai_bindo.html'">Edit Nilai</button>

          <button class="btn-hapus" onclick="window.location.href = 'cari_hapus_nilai_bindo.html'">Hapus Nilai</button>
        </div>

        <table>
          <tr>
            <th>ID Nilai</th>
            <th>Nama Siswa</th>
            <th>Nilai</th>
          </tr>

          <tr>
            <td colspan="3" class="kosong">Belum ada data nilai Bahasa Indonesia.</td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
