<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Nilai Matematika</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f5f5f5;
      }

      /* HEADER */

      .header {
        background: linear-gradient(135deg, #8b0000, #c1121f);
        color: white;
        padding: 25px 40px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .kembali {
        text-decoration: none;
        color: white;
        background: rgba(255, 255, 255, 0.2);
        padding: 10px 20px;
        border-radius: 10px;
      }

      /* CONTAINER */

      .container {
        width: 90%;
        margin: 30px auto;
      }

      /* CARD */

      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .judul {
        color: #8b0000;
        margin-bottom: 20px;
      }

      /* BUTTON */

      .button-group {
        margin-bottom: 20px;
      }

      .button-group button {
        border: none;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 15px;
      }

      .btn-tambah {
        background: #8b0000;
      }

      .btn-edit {
        background: #f59e0b;
      }

      .btn-hapus {
        background: #dc2626;
      }

      /* TABLE */

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #8b0000;
        color: white;
        padding: 15px;
      }

      td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      .kosong {
        color: #777;
        padding: 25px;
      }

      input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        margin-top:5px;
      }

      label{
          font-weight:600;
      }

      hr{
          border:none;
          border-top:1px solid #ddd;
      }

      form{
          margin-top:20px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Nilai Matematika</h1>

      <a href="kelola_nilai.html" class="kembali"> Kembali </a>
    </div>

    <div class="container">
      <div class="card">
        <h2 class="judul">Data Nilai Matematika</h2>

        <div class="button-group">
          <button class="btn-tambah" onclick="tampilTambah()"> + Tambah Nilai </button>
          <button class="btn-edit" onclick="tampilEdit()">Edit Nilai</button>
          <button class="btn-hapus" onclick="tampilHapus()">Hapus Nilai</button>
        </div>

        <table>
          <tr>
            <th>ID Nilai</th>
            <th>Nama Siswa</th>
            <th>Nilai</th>
          </tr>

          <tr>
            <td colspan="3" class="kosong">Belum ada data nilai Matematika.</td>
          </tr>
        </table>
        <hr style="margin:30px 0">
        <div id="formTambah" style="display:none;">
          <h2 class="judul">Tambah Nilai</h2>
          <form>
            <label> ID Nilai</label>
            <input type="text"><br><br>
            <label> Nama Siswa</label>
            <input type="text"><br><br>
            <label> Nilai</label>
            <input type="number"><br><br>
            <button class="btn-tambah">Simpan</button>
          </form>
        </div>

        <div id="formEdit" style="display:none;">
          <h2 class="judul">Edit Nilai</h2>
          <label>ID Nilai</label><br>
          <input type="text"><br><br>
          <button class="btn-edit">Cari</button>
          <hr></hr>

          <label>Nama Siswa</label><br>
          <input type="text"><br><br>
          <label>Nilai</label><br>
          <input type="number"><br><br>
          <button class="btn-edit">Simpan Perubahan</button>
        </div>

        <div id="formHapus" style="display:none;">
          <h2 class="judul">Hapus Nilai</h2>
          <label>ID Nilai</label><br>
          <input type="text"><br><br>
          <button class="btn-hapus"> Cari </button>
          <hr><br>
          <p>Nama Siswa :</p>
          <p>Nilai :</p>
          <button class="btn-hapus">Hapus Data</button>
        </div>
    </div>

<script>

function sembunyikanSemua(){
    document.getElementById("formTambah").style.display="none";
    document.getElementById("formEdit").style.display="none";
    document.getElementById("formHapus").style.display="none";

}

function tampilTambah(){
    sembunyikanSemua();
    document.getElementById("formTambah").style.display="block";
}

function tampilEdit(){
    sembunyikanSemua();
    document.getElementById("formEdit").style.display="block";

}

function tampilHapus(){
    sembunyikanSemua();
    document.getElementById("formHapus").style.display="block";

}

</script>
  </body>
</html>
