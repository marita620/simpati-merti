<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kelola Nilai</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f5f5f5;
      }

      .header {
        background: linear-gradient(135deg, #8b0000, #c1121f);
        color: white;
        padding: 25px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .kembali {
        text-decoration: none;
        color: white;
        background: rgba(255, 255, 255, 0.2);
        padding: 10px 20px;
        border-radius: 10px;
      }

      .container {
        width: 90%;
        margin: 40px auto;
      }

      .judul {
        text-align: center;
        color: #8b0000;
        margin-bottom: 30px;
      }

      .mapel-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }

      .card {
        width: 280px;
        background: white;
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .icon {
        font-size: 50px;
        margin-bottom: 15px;
      }

      .card h3 {
        color: #8b0000;
        margin-bottom: 10px;
      }

      .card p {
        color: #666;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Kelola Nilai</h1>
      <a href="pengajar.html" class="kembali">Kembali</a>
    </div>

    <div class="container">
      <h2 class="judul">Pilih Mata Pelajaran</h2>

      <div class="mapel-container">
        <div class="card" onclick="window.location.href = 'nilai_matematika.html'">
          <div class="icon">🧮</div>
          <h3>Matematika</h3>
          <p>Kelola nilai Matematika</p>
        </div>

        <div class="card" onclick="window.location.href = 'nilai_bindo.html'">
          <div class="icon">📖</div>
          <h3>Bahasa Indonesia</h3>
          <p>Kelola nilai Bahasa Indonesia</p>
        </div>

        <div class="card" onclick="window.location.href = 'nilai_binggris.html'">
          <div class="icon">🔤</div>
          <h3>Bahasa Inggris</h3>
          <p>Kelola nilai Bahasa Inggris</p>
        </div>
      </div>
    </div>
  </body>
</html>
