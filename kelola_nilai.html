<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kelola Nilai Siswa</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f5f5f5;
      }

      /* HEADER */

      .header {
        background: linear-gradient(135deg, #8b0000, #c1121f);
        color: white;
        padding: 25px 40px;

        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 32px;
      }

      .kembali {
        text-decoration: none;
        color: white;
        background: rgba(255, 255, 255, 0.2);
        padding: 10px 20px;
        border-radius: 10px;
      }

      /* CONTAINER */

      .container {
        width: 90%;
        margin: 30px auto;
      }

      /* CARD */

      .card {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      /* TOMBOL */

      .btn-tambah {
        background: #8b0000;
        color: white;

        border: none;

        padding: 12px 20px;

        border-radius: 10px;

        cursor: pointer;

        margin-bottom: 20px;
      }

      .btn-edit {
        background: #f59e0b;
        color: white;

        border: none;

        padding: 8px 15px;

        border-radius: 8px;

        cursor: pointer;
      }

      .btn-hapus {
        background: #dc2626;
        color: white;

        border: none;

        padding: 8px 15px;

        border-radius: 8px;

        cursor: pointer;
      }

      /* TABEL */

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #8b0000;
        color: white;
        padding: 12px;
      }

      td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
      }

      .judul {
        color: #8b0000;
        margin-bottom: 20px;
      }

      .kosong {
        text-align: center;
        color: #888;
        padding: 30px;
      }

      .btn-edit,
      .btn-hapus {
        margin: 0 3px;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>Kelola Nilai Siswa</h1>

      <a href="pengajar.html" class="kembali"> Kembali </a>
    </div>

    <div class="container">
      <div class="card">
        <h2 class="judul">Data Nilai Siswa</h2>

        <button class="btn-tambah" onclick="window.location.href = 'tambah_nilai.html'">+ Tambah Nilai</button>

        <table>
          <tr>
            <th>ID Nilai</th>
            <th>Nama Siswa</th>
            <th>Mata Pelajaran</th>
            <th>Nilai</th>
            <th>Aksi</th>
          </tr>

          <tr>
            <td>N001</td>
            <td>Nama Siswa</td>
            <td>Matematika</td>
            <td>85</td>
            <td>
              <button class="btn-edit" onclick="window.location.href = 'edit_nilai.html'">Edit</button>

              <button class="btn-hapus" onclick="return confirm('Yakin ingin menghapus data?');">Hapus</button>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
