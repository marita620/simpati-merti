<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Data Mapel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f9;
}

.header{

background:linear-gradient(135deg,#8B0000,#C1121F);
padding:25px 40px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

}

.kembali{

text-decoration:none;
color:white;

padding:12px 22px;

border-radius:12px;

background:rgba(255,255,255,.2);

}

.container{

width:90%;
margin:35px auto;

}

.card{

background:white;

padding:35px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

}

.judul{

color:#8B0000;
margin-bottom:5px;

}

.sub{

color:#666;
margin-bottom:25px;

}

.button-group{

display:flex;
gap:15px;
margin-bottom:30px;

}

button{

border:none;
cursor:pointer;

padding:14px 28px;

border-radius:10px;

font-weight:600;

color:white;

transition:.3s;

}

button:hover{

transform:translateY(-2px);

}

.tambah{

background:#16A34A;

}

.edit{

background:#F59E0B;

}

.hapus{

background:#DC2626;

}

.form-box{

display:none;

background:#fafafa;

padding:30px;

border-radius:15px;

margin-top:25px;

animation:muncul .3s;

}

.form-box h2{

margin-bottom:20px;

color:#8B0000;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border:1px solid #ddd;

border-radius:10px;

}

.btn-save{

background:#8B0000;

}

table{

width:100%;
margin-top:25px;

border-collapse:collapse;

}

th{

background:#8B0000;

color:white;

padding:15px;

}

td{

padding:15px;

border-bottom:1px solid #ddd;

text-align:center;

}

@keyframes muncul{

from{

opacity:0;
transform:translateY(-10px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="header">

<h1>Kelola Data Mapel</h1>

<a href="pengajar.html" class="kembali">Kembali</a>

</div>

<div class="container">

<div class="card">

<h2 class="judul">Data Mata Pelajaran</h2>

<p class="sub">
Tambah, edit, dan hapus data mata pelajaran.
</p>

<div class="button-group">

<button class="tambah" onclick="tampilTambah()">
Tambah
</button>

<button class="edit" onclick="tampilCariEdit()">
Edit
</button>

<button class="hapus" onclick="tampilCariHapus()">
Hapus
</button>

</div>

<table>

<tr>

<th>ID Mapel</th>
<th>Nama Mapel</th>

</tr>

<tr>

<td>MPL001</td>
<td>Bahasa Inggris</td>

</tr>

</table>

<!-- ================= TAMBAH ================= -->

<div id="tambah" class="form-box">

<h2>Tambah Data Mapel</h2>

<form action="proses_tambah_mapel.php" method="POST">

<input type="text" name="id_mapel" placeholder="ID Mapel">

<input type="text" name="nama_mapel" placeholder="Nama Mata Pelajaran">

<button class="btn-save">
Simpan
</button>

</form>

</div>

<!-- ================= CARI EDIT ================= -->

<div id="cariEdit" class="form-box">

<h2>Cari ID Mapel</h2>

<form action="edit_mapel.php" method="GET">

<input type="text" name="id_mapel" placeholder="Masukkan ID Mapel">

<button class="edit">
Cari
</button>

</form>

</div>

<!-- ================= EDIT ================= -->

<div id="editData" class="form-box">

<h2>Edit Data Mapel</h2>

<form action="proses_edit_mapel.php" method="POST">

<input type="text" name="id_mapel" value="MPL001" readonly>

<input type="text" name="nama_mapel" value="Bahasa Inggris">

<button class="btn-save">
Simpan
</button>

</form>

</div>

<!-- ================= CARI HAPUS ================= -->

<div id="cariHapus" class="form-box">

<h2>Cari ID Mapel</h2>

<form action="hapus_mapel.php" method="GET">

<input type="text" name="id_mapel" placeholder="Masukkan ID Mapel">

<button class="hapus">
Cari
</button>

</form>

</div>

<!-- ================= HAPUS ================= -->

<div id="hapusData" class="form-box">

<h2>Data Mapel</h2>

<form action="proses_hapus_mapel.php" method="POST">

<input type="text" name="id_mapel" value="MPL001" readonly>

<input type="text" value="Bahasa Inggris" readonly>

<button class="hapus">
Hapus
</button>

</form>

</div>

</div>

</div>

<script>

function sembunyikan(){

document.getElementById("tambah").style.display="none";

document.getElementById("cariEdit").style.display="none";

document.getElementById("editData").style.display="none";

document.getElementById("cariHapus").style.display="none";

document.getElementById("hapusData").style.display="none";

}

function tampilTambah(){

sembunyikan();

document.getElementById("tambah").style.display="block";

}

function tampilCariEdit(){

sembunyikan();

document.getElementById("cariEdit").style.display="block";

}

function tampilEdit(){

sembunyikan();

document.getElementById("editData").style.display="block";

}

function tampilCariHapus(){

sembunyikan();

document.getElementById("cariHapus").style.display="block";

}

function tampilHapus(){

sembunyikan();

document.getElementById("hapusData").style.display="block";

}

</script>

</body>
</html>
